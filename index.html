<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Re0 第四季倒计时</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #121212;
            /* 暗色背景更契合氛围 */
            color: #ffffff;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .title {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #a29bfe;
            /* 淡淡的紫色，可以自行修改 */
        }

        .countdown {
            font-size: 6rem;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            /* 让数字等宽，避免跳动 */
            text-shadow: 0 0 20px rgba(162, 155, 254, 0.5);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="title">距离Re0 第四季下一集播出还有</div>
        <div class="countdown" id="timer">计算中...</div>
    </div>

    <script>
        function getNextWednesdayAt10PM() {
            const now = new Date();
            // 获取当前时间的周几 (0是周日，3是周三)
            const dayOfWeek = now.getDay();

            // 计算距离下一个周三还有几天
            // 如果今天是周三(3)，需要判断是否已经过了晚上10点
            let daysUntilWednesday = (3 - dayOfWeek + 7) % 7;

            const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 22, 0, 0, 0);

            if (daysUntilWednesday === 0 && now.getTime() >= target.getTime()) {
                // 如果今天是周三且过了晚上10点，目标推迟到下周三
                daysUntilWednesday = 7;
            }

            target.setDate(target.getDate() + daysUntilWednesday);
            return target;
        }

        function updateTimer() {
            const now = new Date();
            const target = getNextWednesdayAt10PM();
            const diff = target - now;

            if (diff <= 0) {
                document.getElementById('timer').innerText = "00:00:00";
                return;
            }

            // 计算天、时、分、秒
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            // 格式化输出为 补零格式
            const format = (num) => String(num).padStart(2, '0');

            let timeString = `${format(hours)}:${format(minutes)}:${format(seconds)}`;
            if (days > 0) {
                timeString = `${days}天 ` + timeString;
            }

            document.getElementById('timer').innerText = timeString;
        }

        // 初始化并每秒更新
        updateTimer();
        setInterval(updateTimer, 1000);
    </script>
</body>

</html>
