<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Re:ゼロから始める異世界生活 - 第四季倒计时</title>
    <style>
        /* ========== 全局重置 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: url('EMT.png') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            font-family: "Yu Mincho", "MS Mincho", "Noto Serif SC", "Source Han Serif SC",
                "Microsoft YaHei", "PingFang SC", serif;
            overflow: hidden;
            user-select: none;
        }

        /* ========== 渐变遮罩：顶部深 → 底部透明，保护脸部 ========== */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg,
                    rgba(0, 0, 0, 0.72) 0%,
                    rgba(0, 0, 0, 0.45) 25%,
                    rgba(0, 0, 0, 0.15) 50%,
                    rgba(0, 0, 0, 0.03) 75%,
                    rgba(0, 0, 0, 0.00) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* ========== 粒子画布 ========== */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* ========== 顶部卡片容器 ========== */
        .container {
            position: fixed;
            top: 36px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            width: min(90vw, 1000px);
            padding: 28px 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 28px;

            /* 毛玻璃 + 渐变边框 */
            background: rgba(10, 8, 25, 0.55);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 28px;
            border: 1px solid transparent;
            background-clip: padding-box;
            position: relative;
            box-shadow:
                0 12px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);

            animation: containerIn 1s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        /* 渐变边框伪元素 */
        .container::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 30px;
            padding: 2px;
            background: linear-gradient(135deg,
                    rgba(168, 192, 255, 0.6),
                    rgba(100, 80, 200, 0.3),
                    rgba(168, 192, 255, 0.1),
                    rgba(168, 192, 255, 0.6));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            animation: borderGlow 4s ease-in-out infinite alternate;
        }

        @keyframes borderGlow {
            0% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        @keyframes containerIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-40px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0) scale(1);
            }
        }

        /* ========== 左侧品牌区 ========== */
        .brand {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
        }

        .anime-title {
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 3px;
            line-height: 1.4;
            background: linear-gradient(135deg, #f0eaff 0%, #b8ccff 60%, #8a7cf5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(162, 155, 254, 0.25);
        }

        .anime-title .jp-sub {
            display: block;
            font-size: 0.6rem;
            font-weight: 400;
            letter-spacing: 1px;
            color: rgba(200, 195, 220, 0.5);
            -webkit-text-fill-color: rgba(200, 195, 220, 0.5);
            margin-top: 1px;
        }

        .season-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            padding: 5px 16px 5px 14px;
            background: rgba(168, 192, 255, 0.12);
            border: 1px solid rgba(168, 192, 255, 0.20);
            border-radius: 100px;
            font-size: 0.78rem;
            letter-spacing: 1px;
            color: rgba(220, 215, 255, 0.95);
        }

        .season-badge .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #7b6cf0;
            animation: pulseDot 2s ease-in-out infinite;
        }

        @keyframes pulseDot {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(123, 108, 240, 0.6);
            }

            50% {
                box-shadow: 0 0 0 6px rgba(123, 108, 240, 0);
            }
        }

        /* ========== 右侧倒计时区 ========== */
        .countdown-wrapper {
            display: flex;
            align-items: center;
            gap: 28px;
            flex-shrink: 0;
        }

        /* 进度环 */
        .progress-ring-container {
            position: relative;
            width: 110px;
            height: 110px;
            flex-shrink: 0;
        }

        .progress-ring-container svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .progress-ring-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.06);
            stroke-width: 4;
        }

        .progress-ring-fg {
            fill: none;
            stroke: url(#ringGrad);
            stroke-width: 4;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease;
        }

        .ring-center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .ring-center-text .days-num {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e8dfff, #a8c0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .ring-center-text .days-label {
            font-size: 0.6rem;
            color: rgba(200, 195, 220, 0.6);
            letter-spacing: 2px;
            margin-top: 2px;
        }

        /* 时间数字 */
        .timer-display {
            text-align: left;
        }

        .timer-label {
            font-size: 0.7rem;
            color: rgba(200, 195, 220, 0.5);
            letter-spacing: 2px;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .timer-numbers {
            font-size: 3.8rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: 4px;
            font-family: "Inter", "SF Mono", "Fira Code", monospace;
            background: linear-gradient(135deg, #ffffff 0%, #d4ccff 50%, #a8c0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 60px rgba(162, 155, 254, 0.2);
            line-height: 1;
            transition: opacity 0.2s;
        }

        .timer-numbers .unit {
            font-size: 1rem;
            font-weight: 400;
            font-family: "Yu Mincho", serif;
            -webkit-text-fill-color: rgba(200, 195, 220, 0.4);
            margin: 0 2px;
        }

        .next-date {
            font-size: 0.72rem;
            color: rgba(200, 195, 220, 0.5);
            margin-top: 6px;
            letter-spacing: 1px;
        }

        .next-date strong {
            color: rgba(220, 215, 255, 0.8);
            font-weight: 500;
        }

        /* ========== 底部进度条 ========== */
        .weekly-bar {
            position: absolute;
            bottom: 0;
            left: 24px;
            right: 24px;
            height: 2px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 2px;
            overflow: hidden;
        }

        .weekly-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #7b6cf0, #a8c0ff);
            border-radius: 2px;
            transition: width 1s ease;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .container {
                top: 16px;
                padding: 18px 20px;
                flex-direction: column;
                gap: 14px;
                width: min(94vw, 420px);
                border-radius: 20px;
            }

            .container::before {
                border-radius: 22px;
            }

            .brand {
                align-items: center;
                text-align: center;
            }

            .anime-title {
                font-size: 0.9rem;
            }

            .countdown-wrapper {
                flex-direction: column;
                gap: 10px;
                align-items: center;
            }

            .progress-ring-container {
                width: 72px;
                height: 72px;
            }

            .ring-center-text .days-num {
                font-size: 1.2rem;
            }

            .timer-numbers {
                font-size: 2.6rem;
                letter-spacing: 2px;
            }

            .timer-display {
                text-align: center;
            }

            .timer-label {
                text-align: center;
            }

            .weekly-bar {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 16px 18px;
                top: 10px;
            }

            .timer-numbers {
                font-size: 2rem;
            }

            .progress-ring-container {
                width: 64px;
                height: 64px;
            }

            .ring-center-text .days-num {
                font-size: 1rem;
            }

            .anime-title {
                font-size: 0.78rem;
            }

            .season-badge {
                font-size: 0.65rem;
                padding: 4px 12px;
            }
        }
    </style>
</head>

<body>

    <!-- 渐变遮罩 -->
    <div class="overlay"></div>

    <!-- 粒子画布 -->
    <canvas id="particle-canvas"></canvas>

    <!-- SVG Defs（进度环渐变色） -->
    <svg style="position:absolute;width:0;height:0;" aria-hidden="true">
        <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#a8c0ff" />
                <stop offset="100%" stop-color="#7b6cf0" />
            </linearGradient>
        </defs>
    </svg>

    <!-- 主卡片 -->
    <div class="container">
        <!-- 左侧品牌 -->
        <div class="brand">
            <div class="anime-title">
                Re:ゼロから始める異世界生活
                <span class="jp-sub">Re: Zero kara Hajimeru Isekai Seikatsu</span>
            </div>
            <div class="season-badge">
                <span class="dot"></span>
                第四季 · 放送中
            </div>
        </div>

        <!-- 右侧倒计时 -->
        <div class="countdown-wrapper">
            <div class="progress-ring-container">
                <svg viewBox="0 0 120 120">
                    <circle class="progress-ring-bg" cx="60" cy="60" r="52" />
                    <circle class="progress-ring-fg" id="progress-ring" cx="60" cy="60" r="52" stroke-dasharray="326.73"
                        stroke-dashoffset="0" />
                </svg>
                <div class="ring-center-text">
                    <div class="days-num" id="days-number">0</div>
                    <div class="days-label">DAYS</div>
                </div>
            </div>

            <div class="timer-display">
                <div class="timer-label">NEXT EPISODE</div>
                <div class="timer-numbers" id="timer">
                    <span id="hours">00</span><span class="unit">h</span>
                    <span id="minutes">00</span><span class="unit">m</span>
                    <span id="seconds">00</span><span class="unit">s</span>
                </div>
                <div class="next-date" id="next-date">次回放送：<strong>计算中...</strong></div>
            </div>
        </div>

        <!-- 每周进度条 -->
        <div class="weekly-bar">
            <div class="weekly-bar-fill" id="weekly-bar-fill"></div>
        </div>
    </div>

    <script>
        // ================================================================
        //  1. 粒子系统
        // ================================================================
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animId;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2.2 + 0.6;
                this.speedX = (Math.random() - 0.5) * 0.25;
                this.speedY = (Math.random() - 0.5) * 0.25 - 0.08;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.life = Math.random() * 300 + 200;
                this.maxLife = this.life;
                this.shape = Math.random() > 0.7 ? 'star' : 'circle';
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life--;
                this.opacity = Math.min(this.opacity, (this.life / this.maxLife) * 0.6);
                if (this.life <= 0 || this.x < -10 || this.x > canvas.width + 10 || this.y < -10 || this.y > canvas
                    .height + 10) {
                    this.reset();
                    this.y = canvas.height + 5;
                    this.life = this.maxLife;
                }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#d4ccff';
                ctx.shadowColor = '#a8c0ff';
                ctx.shadowBlur = 8;
                if (this.shape === 'star') {
                    this.drawStar(ctx, this.x, this.y, this.size * 1.5);
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
            drawStar(c, x, y, r) {
                const spikes = 4;
                const outerR = r;
                const innerR = r * 0.5;
                c.beginPath();
                for (let i = 0; i < spikes * 2; i++) {
                    const radius = i % 2 === 0 ? outerR : innerR;
                    const angle = (i * Math.PI) / spikes - Math.PI / 2;
                    const px = x + Math.cos(angle) * radius;
                    const py = y + Math.sin(angle) * radius;
                    i === 0 ? c.moveTo(px, py) : c.lineTo(px, py);
                }
                c.closePath();
                c.fill();
            }
        }

        function initParticles() {
            const count = Math.min(60, Math.floor((window.innerWidth * window.innerHeight) / 15000));
            particles = [];
            for (let i = 0; i < count; i++) {
                const p = new Particle();
                p.y = Math.random() * canvas.height;
                p.life = Math.random() * p.maxLife;
                particles.push(p);
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (const p of particles) {
                p.update();
                p.draw();
            }
            animId = requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        // ================================================================
        //  2. 倒计时逻辑
        // ================================================================
        const AIRING_DAY = 3; // 周三
        const AIRING_HOUR = 22;
        const AIRING_MIN = 0;

        // 第四季首播日期（用于推算当前集数）
        const SEASON_START = new Date(2025, 9, 1, 22, 0, 0); // 2025-10-01 假设

        function getNextAiring() {
            const now = new Date();
            const dow = now.getDay();
            let daysUntil = (AIRING_DAY - dow + 7) % 7;
            const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), AIRING_HOUR, AIRING_MIN, 0, 0);
            if (daysUntil === 0 && now >= target) daysUntil = 7;
            target.setDate(target.getDate() + daysUntil);
            return target;
        }

        function getEpisodeNumber(targetDate) {
            const diff = targetDate - SEASON_START;
            if (diff < 0) return 1;
            const weeks = Math.round(diff / (7 * 24 * 60 * 60 * 1000));
            return Math.max(1, weeks + 1);
        }

        function formatDateJP(d) {
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            const m = d.getMonth() + 1;
            const day = d.getDate();
            const wd = days[d.getDay()];
            return `${m}月${day}日（${wd}）`;
        }

        const CIRCUMFERENCE = 2 * Math.PI * 52; // r=52

        function updateCountdown() {
            const now = new Date();
            const target = getNextAiring();
            const diff = target - now;

            if (diff <= 0) {
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                document.getElementById('days-number').textContent = '0';
                return;
            }

            const totalSec = Math.floor(diff / 1000);
            const days = Math.floor(totalSec / 86400);
            const hours = Math.floor((totalSec % 86400) / 3600);
            const mins = Math.floor((totalSec % 3600) / 60);
            const secs = totalSec % 60;

            const f = (n) => String(n).padStart(2, '0');

            document.getElementById('hours').textContent = f(hours);
            document.getElementById('minutes').textContent = f(mins);
            document.getElementById('seconds').textContent = f(secs);
            document.getElementById('days-number').textContent = days;

            // 进度环 (一周 = 604800秒)
            const weekProgress = 1 - (diff / (7 * 86400 * 1000));
            const offset = CIRCUMFERENCE * (1 - Math.min(1, Math.max(0, weekProgress)));
            document.getElementById('progress-ring').setAttribute('stroke-dashoffset', offset);

            // 每周进度条
            document.getElementById('weekly-bar-fill').style.width = `${(1 - weekProgress) * 100}%`;

            // 下一集日期
            const ep = getEpisodeNumber(target);
            document.getElementById('next-date').innerHTML =
                `第${ep}話 · 次回放送：<strong>${formatDateJP(target)} ${f(AIRING_HOUR)}:${f(AIRING_MIN)}</strong>`;
        }

        updateCountdown();
        setInterval(updateCountdown, 500);
    </script>
</body>

</html>
