<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Re:从零开始的异世界生活 - 夺还编倒计时</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            min-height: 100vh;
            background: url('EMT.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            font-family: "Yu Mincho", "MS Mincho", "Noto Serif SC", "Microsoft YaHei", serif;
            overflow-x: hidden
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, .04) 38%, rgba(0, 0, 0, .2) 60%, rgba(0, 0, 0, .76) 100%);
            z-index: 1;
            pointer-events: none
        }

        #particle-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none
        }

        .container {
            position: relative;
            z-index: 3;
            width: min(90vw, 1000px);
            margin: 0 auto;
            padding: 34px 40px 25px;
            top: max(50vh, 360px);
            transform: translateY(-50%);
            background: rgba(10, 8, 25, .58);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(176, 190, 255, .3);
            border-radius: 24px;
            box-shadow: 0 12px 60px rgba(0, 0, 0, .5), inset 0 1px 0 rgba(255, 255, 255, .08);
            animation: rise .8s cubic-bezier(.22, 1, .36, 1) both
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(calc(-50% + 35px)) scale(.97)
            }

            to {
                opacity: 1;
                transform: translateY(-50%) scale(1)
            }
        }

        .main-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 32px
        }

        .brand {
            flex: 1
        }

        .anime-title {
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 3px;
            line-height: 1.45;
            background: linear-gradient(135deg, #f0eaff, #b8ccff 60%, #8a7cf5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .jp-sub {
            display: block;
            margin-top: 2px;
            font-size: .6rem;
            font-weight: 400;
            letter-spacing: 1px;
            color: rgba(210, 205, 230, .58);
            -webkit-text-fill-color: rgba(210, 205, 230, .58)
        }

        .season-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            padding: 6px 14px;
            border: 1px solid rgba(168, 192, 255, .25);
            border-radius: 99px;
            background: rgba(168, 192, 255, .12);
            font-size: .78rem;
            letter-spacing: 1px;
            color: #e3ddff
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #9b88ff;
            box-shadow: 0 0 0 0 rgba(155, 136, 255, .6);
            animation: pulse 2s infinite
        }

        @keyframes pulse {
            50% {
                box-shadow: 0 0 0 6px rgba(155, 136, 255, 0)
            }
        }

        .countdown-wrapper {
            display: flex;
            align-items: center;
            gap: 26px
        }

        .ring {
            position: relative;
            width: 106px;
            height: 106px;
            flex: none
        }

        .ring svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg)
        }

        .ring circle {
            fill: none;
            stroke-width: 4
        }

        .ring .base {
            stroke: rgba(255, 255, 255, .08)
        }

        .ring .progress {
            stroke: #b4c7ff;
            stroke-linecap: round;
            transition: stroke-dashoffset .8s
        }

        .ring-text {
            position: absolute;
            inset: 0;
            display: grid;
            place-content: center;
            text-align: center
        }

        .ring-text b {
            font-size: 1.85rem;
            line-height: 1;
            background: linear-gradient(135deg, #fff, #a8c0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .ring-text span {
            margin-top: 4px;
            font-size: .55rem;
            letter-spacing: 2px;
            color: rgba(210, 205, 230, .6)
        }

        .timer-label {
            font-size: .68rem;
            color: rgba(210, 205, 230, .58);
            letter-spacing: 2px
        }

        .timer-numbers {
            margin-top: 5px;
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: clamp(2rem, 4.2vw, 3.7rem);
            font-weight: 700;
            line-height: 1;
            letter-spacing: 2px;
            white-space: nowrap;
            background: linear-gradient(135deg, #fff, #d4ccff 52%, #a8c0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .timer-numbers em {
            font-style: normal;
            font-family: inherit;
            font-size: .8rem;
            font-weight: 400;
            -webkit-text-fill-color: rgba(210, 205, 230, .5)
        }

        .next-date {
            margin-top: 8px;
            font-size: .72rem;
            letter-spacing: .6px;
            color: rgba(210, 205, 230, .63)
        }

        .next-date strong {
            font-weight: 500;
            color: rgba(235, 231, 255, .9)
        }

        details {
            margin-top: 24px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, .1)
        }

        summary {
            cursor: pointer;
            list-style: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: rgba(225, 220, 245, .88);
            font-size: .78rem;
            letter-spacing: 1px
        }

        summary::-webkit-details-marker {
            display: none
        }

        summary::after {
            content: '＋';
            font-size: 1rem;
            color: #b8ccff
        }

        details[open] summary::after {
            content: '−'
        }

        .episode-list {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 14px
        }

        .episode {
            position: relative;
            display: block;
            min-height: 94px;
            padding: 10px 11px;
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 10px;
            background: rgba(255, 255, 255, .04);
            color: #e8e3ff;
            text-decoration: none;
            transition: .2s
        }

        .episode:hover {
            background: rgba(168, 192, 255, .16);
            border-color: rgba(168, 192, 255, .45);
            transform: translateY(-2px)
        }

        .episode-no {
            display: block;
            color: #b8ccff;
            font-size: .62rem;
            letter-spacing: .08em
        }

        .episode-cn {
            display: block;
            margin-top: 7px;
            font-size: .76rem;
            line-height: 1.25
        }

        .episode-jp {
            display: block;
            margin-top: 4px;
            color: rgba(218, 212, 238, .64);
            font-size: .61rem;
            line-height: 1.3
        }

        .episode time {
            display: block;
            margin-top: 6px;
            color: rgba(210, 205, 230, .48);
            font-size: .59rem
        }

        .episode i {
            position: absolute;
            right: 9px;
            top: 8px;
            font-style: normal;
            color: #b8ccff
        }

        .source {
            margin-top: 12px;
            color: rgba(210, 205, 230, .48);
            font-size: .65rem;
            line-height: 1.5
        }

        .source a {
            color: #c4d5ff
        }

        @media(max-width:760px) {
            .container {
                top: auto;
                transform: none;
                margin: 0 auto 18px;
                padding: 22px 20px;
                width: min(94vw, 480px)
            }

            @keyframes rise {
                from {
                    opacity: 0;
                    transform: translateY(25px)
                }

                to {
                    opacity: 1;
                    transform: none
                }
            }

            .main-row {
                flex-direction: column;
                align-items: center;
                gap: 20px
            }

            .brand {
                text-align: center
            }

            .countdown-wrapper {
                gap: 16px
            }

            .episode-list {
                grid-template-columns: repeat(2, 1fr)
            }
        }

        @media(max-width:390px) {
            .ring {
                width: 76px;
                height: 76px
            }

            .ring-text b {
                font-size: 1.35rem
            }

            .timer-numbers {
                font-size: 1.75rem
            }

            .countdown-wrapper {
                gap: 10px
            }
        }
    </style>
</head>

<body>
    <div class="overlay"></div><canvas id="particle-canvas"></canvas>
    <main class="container">
        <div class="main-row">
            <section class="brand">
                <div class="anime-title">Re:从零开始的异世界生活<span class="jp-sub">Re: Zero kara Hajimeru Isekai Seikatsu</span>
                </div>
                <div class="season-badge"><span class="dot"></span>第四季 · 《夺还编》</div>
            </section>
            <section class="countdown-wrapper" aria-live="polite">
                <div class="ring"><svg viewBox="0 0 120 120">
                        <circle class="base" cx="60" cy="60" r="52" />
                        <circle class="progress" id="ring" cx="60" cy="60" r="52" stroke-dasharray="326.73" />
                    </svg>
                    <div class="ring-text"><b id="days">00</b><span>DAYS</span></div>
                </div>
                <div>
                    <div class="timer-label">UNTIL THE RECLAMATION ARC</div>
                    <div class="timer-numbers"><span id="hours">00</span><em>h</em> <span
                            id="minutes">00</span><em>m</em> <span id="seconds">00</span><em>s</em></div>
                    <div class="next-date" id="next-date">首播：<strong>2026 年 8 月 12 日（周三）22:00 JST</strong></div>
                </div>
            </section>
        </div>
        <details>
            <summary>在「夺还编」之前 · 《丧失编》全 11 集</summary>
            <div class="episode-list" id="episodes"></div>
            <p class="source">点击集数前往官方 ABEMA 播放页；播放权限因地区而异。播出信息以 <a href="https://re-zero-anime.jp/tv/onair/"
                    target="_blank" rel="noreferrer">官方页面</a> 为准。</p>
        </details>
    </main>
    <script>
        const target = new Date('2026-08-12T22:00:00+09:00'), C = 326.73, play = 'https://abema.tv/video/title/25-139?s=25-139_s4';
        const episodes = [
            ['04.08', '带你离开的理由／华丽猛虎·再装填', '君を連れ出す理由／ゴージャス・タイガー・リローデッド'],
            ['04.15', '跨越砂时', '砂時間を越えろ'], ['04.22', '监视塔的守门人', '監視塔の番人'], ['04.29', '白色星空的星群', '白い星空のアステリズム'],
            ['05.06', '挥棒人', '棒振り'], ['05.13', '尤里乌斯·尤克历乌斯', 'ユリウス・ユークリウス'], ['05.20', '走出便利店，那里是不可思议的世界', 'コンビニを出ると、そこは不思議の世界でした'],
            ['05.27', '你是谁', 'オマエハダレダ'], ['06.03', '残骸', '残骸'], ['06.10', '杀人会成为习惯', '殺人は癖になる'], ['06.17', 'Re:从零开始的异世界生活', 'Re:ゼロから始まる異世界生活']
        ];
        document.getElementById('episodes').innerHTML = episodes.map((e, i) => `<a class="episode" href="${play}" target="_blank" rel="noreferrer" aria-label="第${i + 1}集：${e[1]}，前往官方播放页"><span class="episode-no">第 ${i + 1} 集／EP.${67 + i}</span><span class="episode-cn">${e[1]}</span><span class="episode-jp" lang="ja">${e[2]}</span><time>2026.${e[0]} <i>↗</i></time></a>`).join('');
        function update() { let left = Math.max(0, Math.floor((target - new Date()) / 1000)), d = Math.floor(left / 86400), h = Math.floor(left % 86400 / 3600), m = Math.floor(left % 3600 / 60), s = left % 60, f = n => String(n).padStart(2, '0'); days.textContent = d; hours.textContent = f(h); minutes.textContent = f(m); seconds.textContent = f(s); document.getElementById('ring').setAttribute('stroke-dashoffset', C * (1 - (1 - ((left % 604800) / 604800)))); if (!left) document.getElementById('next-date').innerHTML = '<strong>《夺还编》现已开播</strong>' } update(); setInterval(update, 1000);
        const c = document.getElementById('particle-canvas'), x = c.getContext('2d'); let p = []; function fit() { c.width = innerWidth; c.height = innerHeight } function init() { p = Array.from({ length: Math.min(55, innerWidth * innerHeight / 15000) }, () => ({ x: Math.random() * c.width, y: Math.random() * c.height, r: Math.random() * 1.6 + .4, v: Math.random() * .18 + .03, a: Math.random() * .4 + .08 })) } function draw() { x.clearRect(0, 0, c.width, c.height); p.forEach(q => { q.y -= q.v; if (q.y < 0) { q.y = c.height; q.x = Math.random() * c.width } x.globalAlpha = q.a; x.fillStyle = '#d4ccff'; x.beginPath(); x.arc(q.x, q.y, q.r, 0, 7); x.fill() }); requestAnimationFrame(draw) } addEventListener('resize', () => { fit(); init() }); fit(); init(); draw();
    </script>
</body>

</html>
